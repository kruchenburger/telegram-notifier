name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  tracker:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: actions/checkout@v4
      - name: Pipeline tracker
        id: tracker
        continue-on-error: true
        uses: ./
        with:
          token: ${{ secrets.TG_TOKEN }}
          chat_id: ${{ secrets.TG_CHAT_ID }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pipeline: true
          exclude-jobs: tracker
          poll-interval: "5"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --frozen
      - run: uv run pytest

  skipped-job:
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "This never runs"

  selftest:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Self test
        id: selftest
        uses: ./
        with:
          status: ${{ job.status }}
          token: ${{ secrets.TG_TOKEN }}
          chat_id: ${{ secrets.TG_CHAT_ID }}

      - name: Check outputs
        run: |
          test "${{ steps.selftest.outputs.status }}" == "Successfully delivered"
